name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  # ─── Lint ───────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint backend
        run: npx eslint "src/**/*.ts" "tests/**/*.ts"

      - name: Lint frontend
        run: npx eslint src --max-warnings 0
        working-directory: frontend

  # ─── Type-check ─────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Typecheck backend
        run: npm run typecheck

      - name: Typecheck frontend
        run: npx tsc --noEmit
        working-directory: frontend

  # ─── All Tests (Unified) ────────────────────────────────────────────
  test-all:
    name: All Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: poker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build backend
        run: npm run build

      - name: Run ALL tests (optimized parallel)
        run: npm run qa:all
        env:
          NODE_ENV: test
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_USERNAME: postgres
          TEST_DB_PASSWORD: postgres
          TEST_DB_NAME: poker_test

      - name: Run frontend tests
        run: npm run test:run
        working-directory: frontend

      - name: Upload QA Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report
          path: docs/qa_report.md
          retention-days: 7

  # ─── Monster Army QA ────────────────────────────────────────────────
  monster-army:
    name: Monster Army QA
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: poker
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build backend
        run: npm run build

      - name: Start backend
        run: |
          node dist/src/main.js &
          sleep 10
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: poker
          DB_SYNCHRONIZE: 'true'
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-secret-key-for-ci

      - name: Start frontend
        run: |
          npx vite --host 0.0.0.0 --port 3001 &
          sleep 5
        working-directory: frontend

      - name: Run Monster Army (Full validation - 17s)
        id: monsters
        run: npm run monsters:all 2>&1 | tee monster-report.txt
        continue-on-error: true
        env:
          API_URL: http://localhost:3000/api/v1
          FRONTEND_URL: http://localhost:3001
          CI: true

      - name: Run Simulation Monster (Live game validation - 28s)
        id: simulation
        run: npm run monsters:simulation 2>&1 | tee simulation-report.txt
        continue-on-error: true
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: poker
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          CI: true

      - name: Upload Monster Report
        uses: actions/upload-artifact@v4
        with:
          name: monster-army-report
          path: |
            docs/MONSTERS_ISSUES.md
            docs/monster_stats.md
            monster-report.txt
            simulation-report.txt
          retention-days: 14

      - name: Comment on PR with findings
        if: github.event_name == 'pull_request' && steps.monsters.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '';
            
            // Read unified issues report
            if (fs.existsSync('docs/MONSTERS_ISSUES.md')) {
              report = fs.readFileSync('docs/MONSTERS_ISSUES.md', 'utf8');
            }
            
            // Add stats
            if (fs.existsSync('docs/monster_stats.md')) {
              report += '\n\n---\n\n' + fs.readFileSync('docs/monster_stats.md', 'utf8');
            }
            
            if (report.length > 60000) {
              report = report.slice(0, 60000) + '\n\n... (truncated)';
            }
            
            if (report) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '## 🦖 Monster Army Report\n\n' + report
              });
            }

      - name: Fail if critical issues found
        if: steps.monsters.outcome == 'failure' || steps.simulation.outcome == 'failure'
        run: |
          echo "Monster Army or Simulation Monster found critical issues!"
          exit 1

  # ─── Build ──────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-all]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  # ─── Docker ─────────────────────────────────────────────────────────
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production
