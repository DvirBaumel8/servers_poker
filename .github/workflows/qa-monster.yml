name: QA Monster

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'src/**'
      - 'tests/**'
    # Only run on PR open and when ready for review, NOT on every commit
    types: [opened, ready_for_review, synchronize]
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Scan type'
        required: true
        default: 'quick'
        type: choice
        options:
          - quick
          - full
          - full-with-improve
      auto_improve:
        description: 'Enable auto-improvement (creates PR with config updates)'
        required: false
        default: false
        type: boolean

  # Nightly full scan with auto-improve
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily

# Cancel in-progress runs when a new commit is pushed
concurrency:
  group: qa-monster-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  coverage-check:
    name: Coverage Check
    runs-on: ubuntu-latest
    # Skip if PR is draft
    if: github.event.pull_request.draft == false
    outputs:
      has_critical: ${{ steps.check-critical.outputs.has_critical }}
      new_pages_missing: ${{ steps.check-new-pages.outputs.missing }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for diff
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check Monster Coverage
        id: coverage
        run: |
          echo "## QA Monster Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          npm run qa:coverage 2>&1 | tee coverage.txt
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat coverage.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      
      - name: Check for New Pages Without Coverage
        id: check-new-pages
        run: |
          MISSING_COVERAGE=0
          
          # Find new/modified page files
          for file in $(git diff --name-only origin/main...HEAD | grep -E 'pages/.*\.(tsx?|jsx?)$' || true); do
            if [ -f "$file" ]; then
              # Extract route from filename
              ROUTE=$(echo "$file" | sed 's|frontend/src/pages||' | sed 's|\.tsx\?||' | sed 's|/index||')
              echo "Checking coverage for: $ROUTE"
              
              # Check if route exists in monster config
              if ! grep -q "path:.*$ROUTE" tests/qa/monster/monster-config.ts 2>/dev/null; then
                echo "::warning::⚠️ New page without monster coverage: $ROUTE"
                MISSING_COVERAGE=1
              fi
            fi
          done
          
          echo "missing=$MISSING_COVERAGE" >> $GITHUB_OUTPUT
      
      - name: Check for Critical Issues in Recent Reports
        id: check-critical
        run: |
          HAS_CRITICAL=0

          # Check the new report location
          REPORT_FILE="tests/qa/monsters/REPORT.md"
          if [ -f "$REPORT_FILE" ]; then
            # Look for critical findings (🔴) in the Open Bugs section
            CRITICAL_COUNT=$(grep -c "🔴 Critical" "$REPORT_FILE" 2>/dev/null || echo "0")
            if [ "$CRITICAL_COUNT" -gt "0" ]; then
              echo "::warning::Found $CRITICAL_COUNT critical issues in QA Monster report"
              HAS_CRITICAL=1
            fi
          fi
          
          echo "has_critical=$HAS_CRITICAL" >> $GITHUB_OUTPUT

  monster-scan:
    name: Monster Scan
    runs-on: ubuntu-latest
    needs: coverage-check
    if: github.event_name == 'schedule' || github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'full-with-improve'
    outputs:
      findings_count: ${{ steps.run-monsters.outputs.findings_count }}
      improvements_made: ${{ steps.run-monsters.outputs.improvements_made }}
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: poker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm ci
          cd frontend && npm ci
      
      - name: Build Backend
        run: npm run build
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: poker
      
      - name: Build Frontend
        run: npm run build:frontend
      
      - name: Setup test database
        run: npm run test:db:setup
        env:
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_USERNAME: postgres
          TEST_DB_PASSWORD: postgres
          TEST_DB_NAME: poker
      
      - name: Start Services
        run: |
          # Start backend
          node dist/src/main.js &
          sleep 10
          
          # Wait for backend to be ready
          for i in {1..30}; do
            if curl -s http://localhost:3000/api/v1/health | grep -q "ok"; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          
          # Start frontend
          cd frontend && npm run preview -- --port 3001 &
          sleep 5
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: poker
          NODE_ENV: test
      
      - name: Run Monster Army
        id: run-monsters
        run: |
          echo "## Monster Army Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Determine if auto-improve should be enabled
          SHOULD_IMPROVE="false"
          if [ "${{ github.event_name }}" == "schedule" ] || [ "${{ github.event.inputs.auto_improve }}" == "true" ] || [ "${{ github.event.inputs.scan_type }}" == "full-with-improve" ]; then
            SHOULD_IMPROVE="true"
            echo "🔧 Auto-improve enabled" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Run the full monster army with appropriate flags
          if [ "$SHOULD_IMPROVE" == "true" ]; then
            # Use evolve:apply to actually write changes (not just dry-run)
            npm run monsters:evolve:apply 2>&1 | tee monster-output.txt || true
          else
            npm run monsters:full 2>&1 | tee monster-output.txt || true
          fi
          
          # Extract findings count
          FINDINGS=$(grep -oP 'Total:\s+\K\d+' monster-output.txt | tail -1 || echo "0")
          echo "findings_count=$FINDINGS" >> $GITHUB_OUTPUT
          
          # Check if improvements were made (any changes in monsters directory)
          if [ -n "$(git status --porcelain tests/qa/monsters/)" ]; then
            echo "improvements_made=true" >> $GITHUB_OUTPUT
            echo "✅ Config improvements generated" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Changes Made" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            git status --short tests/qa/monsters/ >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "improvements_made=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No config improvements needed" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -50 monster-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      
      - name: Upload Monster Report
        uses: actions/upload-artifact@v4
        with:
          name: monster-report
          path: |
            monster-output.txt
            tests/qa/monsters/reports/
            tests/qa/monsters/REPORT.md
          retention-days: 30
      
      - name: Commit improvements (if any)
        if: steps.run-monsters.outputs.improvements_made == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create a unique branch name
          BRANCH_NAME="monster-improve-$(date +%Y%m%d-%H%M%S)"
          git checkout -b $BRANCH_NAME
          
          # Stage and commit changes
          git add tests/qa/monsters/
          git commit -m "chore(monsters): auto-improve configs from CI scan

- Updated monster configurations based on scan findings
- Auto-generated by QA Monster workflow

Findings: ${{ steps.run-monsters.outputs.findings_count }}
Run: ${{ github.run_id }}"
          
          # Push the branch
          git push origin $BRANCH_NAME
          
          # Save branch name for PR creation
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
      
      - name: Create Pull Request
        if: steps.run-monsters.outputs.improvements_made == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = process.env.BRANCH_NAME;
            const findingsCount = '${{ steps.run-monsters.outputs.findings_count }}';
            
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🦖 Monster Army: Auto-improve configs',
              head: branchName,
              base: 'main',
              body: `## Monster Army Auto-Improvements

This PR was automatically created by the QA Monster CI workflow.

### What changed
- Updated monster configurations based on scan findings
- Added new test cases or edge cases as needed
- Updated REPORT.md with latest findings

### Scan Summary
- **Findings detected**: ${findingsCount}
- **Run ID**: ${{ github.run_id }}
- **Triggered by**: ${{ github.event_name }}

### Review Checklist
- [ ] Review the generated test configurations
- [ ] Verify the changes make sense
- [ ] Run \`npm run monsters:quick\` locally to validate

---
*Auto-generated by [QA Monster Workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*
`
            });
            
            console.log(`Created PR #${pr.number}: ${pr.html_url}`);
            
            // Add labels
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['qa-monster', 'auto-generated']
            });

  block-on-critical:
    name: Review Critical Issues
    runs-on: ubuntu-latest
    needs: coverage-check
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Check for Critical Issues
        run: |
          if [ "${{ needs.coverage-check.outputs.has_critical }}" == "1" ]; then
            echo "::warning::QA Monster report still contains critical issues"
            echo ""
            echo "Review docs/reports/QA-MONSTER-REPORT-V1.md before merging."
            exit 0
          fi
          
          echo "✅ No critical issues reported by QA Monster"
      
      - name: Warn on Missing Coverage
        run: |
          if [ "${{ needs.coverage-check.outputs.new_pages_missing }}" == "1" ]; then
            echo "::warning::⚠️ New pages detected without monster coverage"
            echo "Consider adding coverage before merging."
            echo "Run: npm run qa:coverage:check /your-page"
          fi

  pr-comment:
    name: PR Comment
    runs-on: ubuntu-latest
    needs: [coverage-check, block-on-critical]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate Coverage Report
        id: coverage
        run: |
          npm run qa:coverage 2>&1 > coverage.txt || true
          {
            echo 'coverage<<EOF'
            cat coverage.txt
            echo 'EOF'
          } >> $GITHUB_OUTPUT
      
      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          HAS_CRITICAL: ${{ needs.coverage-check.outputs.has_critical }}
          NEW_PAGES_MISSING: ${{ needs.coverage-check.outputs.new_pages_missing }}
        with:
          script: |
            const coverage = `${{ steps.coverage.outputs.coverage }}`;
            const hasCritical = process.env.HAS_CRITICAL === '1';
            const newPagesMissing = process.env.NEW_PAGES_MISSING === '1';
            
            let status = '✅ All checks passed';
            
            if (hasCritical) {
              status = '⚠️ Critical issues reported';
            } else if (newPagesMissing) {
              status = '⚠️ Warning: New pages without coverage';
            }
            
            const body = `## 🦖 QA Monster Report
            
            ### Status: ${status}
            
            ${hasCritical ? `
            > **⚠️ Critical Findings Present**
            > 
            > QA Monster reports critical findings in the latest committed report snapshot.
            > Review \`docs/reports/QA-MONSTER-REPORT-V1.md\` and confirm whether the issues are still open.
            ` : ''}
            
            ${newPagesMissing ? `
            > **⚠️ Coverage Warning**
            > 
            > New pages detected without monster coverage.
            > Run \`npm run qa:coverage:check /your-page\` to see what's missing.
            ` : ''}
            
            <details>
            <summary>Coverage Report</summary>
            
            \`\`\`
            ${coverage}
            \`\`\`
            
            </details>
            
            ### Before Merging Checklist
            
            - [ ] I ran \`npm run qa:monster:quick\` locally
            - [ ] New pages/flows are added to monster config
            - [ ] Edge cases are documented
            - [ ] No critical issues remain unfixed
            
            ---
            *This check is informational for pull requests*
            `;
            
            // Find existing comment to update instead of creating new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(c => 
              c.user.type === 'Bot' && c.body.includes('QA Monster')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

  # Create GitHub issues for high severity findings (runs on nightly scan)
  create-issues:
    name: Create Issues for Findings
    runs-on: ubuntu-latest
    needs: monster-scan
    if: github.event_name == 'schedule' && needs.monster-scan.outputs.findings_count > 0
    permissions:
      issues: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Monster Report
        uses: actions/download-artifact@v4
        with:
          name: monster-report
          path: ./monster-artifacts
      
      - name: Parse Monster Report and Create Issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Try multiple report locations
            const reportPaths = [
              './monster-artifacts/tests/qa/monsters/REPORT.md',
              './monster-artifacts/REPORT.md',
              'tests/qa/monsters/REPORT.md',
            ];
            
            let report = null;
            for (const path of reportPaths) {
              if (fs.existsSync(path)) {
                report = fs.readFileSync(path, 'utf8');
                console.log(`Found report at: ${path}`);
                break;
              }
            }
            
            if (!report) {
              console.log('No monster report found');
              return;
            }
            
            // Get existing issues with qa-monster label
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'qa-monster',
              state: 'open'
            });
            
            const existingTitles = existingIssues.map(i => i.title);
            
            // Parse findings from the new report format
            // Look for bug entries in "## Open Bugs" section
            const bugPattern = /- \*\*(🔴|🟠|🟡|🔵)\s+(\w+)\*\*:\s+(.+)/g;
            let match;
            let createdCount = 0;
            
            while ((match = bugPattern.exec(report)) !== null) {
              const [_, emoji, severity, title] = match;
              const issueTitle = `[QA-Monster] ${title}`;
              
              // Skip if issue already exists (fuzzy match on title)
              const titleLower = title.toLowerCase();
              if (existingTitles.some(t => t.toLowerCase().includes(titleLower.slice(0, 30)))) {
                console.log(`Issue already exists: ${title}`);
                continue;
              }
              
              // Only create issues for critical and high severity
              if (severity !== 'Critical' && severity !== 'High') {
                console.log(`Skipping ${severity} issue: ${title}`);
                continue;
              }
              
              const labels = ['qa-monster', `qa-monster:${severity.toLowerCase()}`];
              if (severity === 'Critical') {
                labels.push('priority:critical');
              }
              
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: `## QA Monster Finding

**Severity**: ${emoji} ${severity}
**Title**: ${title}

### Details
This issue was automatically detected by the QA Monster nightly scan.

### Reproduction
Run \`npm run monsters:full\` locally to reproduce.

### Fix Guidance
1. Review the finding details
2. Implement a fix
3. Run \`npm run monsters:quick\` to verify
4. Close this issue when fixed

---
*Auto-created by QA Monster nightly scan*
*Run: ${{ github.run_id }}*`,
                labels: labels
              });
              
              console.log(`Created issue: ${issueTitle}`);
              createdCount++;
              
              // Rate limit: don't create too many at once
              if (createdCount >= 5) {
                console.log('Created 5 issues, stopping to avoid spam');
                break;
              }
            }
            
            console.log(`Created ${createdCount} new issues`);

  # Weekly stale issue check (runs on Monday)
  stale-check:
    name: Check Stale Issues
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 2 * * 1'
    permissions:
      issues: write
    
    steps:
      - name: Check for Stale QA Monster Issues
        uses: actions/github-script@v7
        with:
          script: |
            const twoWeeksAgo = new Date();
            twoWeeksAgo.setDate(twoWeeksAgo.getDate() - 14);
            
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'qa-monster',
              state: 'open',
              sort: 'created',
              direction: 'asc'
            });
            
            let staleCount = 0;
            
            for (const issue of issues) {
              const createdAt = new Date(issue.created_at);
              
              if (createdAt < twoWeeksAgo) {
                // Add stale label if not already present
                const hasStale = issue.labels.some(l => l.name === 'stale');
                
                if (!hasStale) {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    labels: ['stale']
                  });
                  
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    body: `⏰ **This QA Monster issue is over 2 weeks old.**\n\nPlease update with progress or close if no longer relevant.\n\ncc @${issue.assignee?.login || 'team'}`
                  });
                  
                  staleCount++;
                }
              }
            }
            
            console.log(`Marked ${staleCount} issues as stale`);
