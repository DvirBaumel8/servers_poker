version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: poker-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-poker}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-poker}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - poker-network

  poker-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: poker-server
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-poker}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/games/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - poker-network

  poker-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: poker-dev
    profiles:
      - dev
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-poker}
      - JWT_SECRET=dev-secret-key
      - LOG_LEVEL=debug
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npm", "run", "dev"]
    networks:
      - poker-network

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: poker-migrate
    profiles:
      - migrate
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-poker}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npm", "run", "migration:run"]
    networks:
      - poker-network

volumes:
  postgres-data:
    driver: local

networks:
  poker-network:
    driver: bridge
