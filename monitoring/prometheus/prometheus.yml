global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "poker-server"

rule_files:
  - "alert.rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "poker-server"
    metrics_path: "/api/v1/metrics"
    static_configs:
      # Use host.docker.internal for local dev (poker server running on host)
      # Use poker-server:3000 when running full stack in Docker
      - targets: ["host.docker.internal:3000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "poker-server"
