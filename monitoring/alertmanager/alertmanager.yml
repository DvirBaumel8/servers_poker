global:
  resolve_timeout: 5m
  smtp_smarthost: "smtp.gmail.com:587"
  smtp_from: "alerts@example.com"
  smtp_auth_username: ""
  smtp_auth_password: ""
  smtp_require_tls: true

templates:
  - "/etc/alertmanager/templates/*.tmpl"

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "email-notifications"

  routes:
    - match:
        severity: critical
      receiver: "email-critical"
      group_wait: 10s
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: "email-notifications"
      group_wait: 1m
      repeat_interval: 4h

    - match:
        severity: info
      receiver: "email-notifications"
      group_wait: 5m
      repeat_interval: 24h

receivers:
  - name: "email-critical"
    email_configs:
      - to: "oncall@example.com"
        send_resolved: true
        headers:
          Subject: "[CRITICAL] {{ .GroupLabels.alertname }} - Poker Server"
        html: |
          <h2>🚨 Critical Alert: {{ .GroupLabels.alertname }}</h2>
          {{ range .Alerts }}
          <p><strong>Status:</strong> {{ .Status }}</p>
          <p><strong>Summary:</strong> {{ .Annotations.summary }}</p>
          <p><strong>Description:</strong> {{ .Annotations.description }}</p>
          <p><strong>Started:</strong> {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}</p>
          <hr>
          {{ end }}
          <p><a href="http://localhost:9090/alerts">View in Prometheus</a> | 
             <a href="http://localhost:3002">View in Grafana</a></p>

  - name: "email-notifications"
    email_configs:
      - to: "oncall@example.com"
        send_resolved: true
        headers:
          Subject: "[{{ .GroupLabels.severity | toUpper }}] {{ .GroupLabels.alertname }} - Poker Server"
        html: |
          <h2>⚠️ Alert: {{ .GroupLabels.alertname }}</h2>
          {{ range .Alerts }}
          <p><strong>Status:</strong> {{ .Status }}</p>
          <p><strong>Severity:</strong> {{ .Labels.severity }}</p>
          <p><strong>Summary:</strong> {{ .Annotations.summary }}</p>
          <p><strong>Description:</strong> {{ .Annotations.description }}</p>
          <p><strong>Started:</strong> {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}</p>
          <hr>
          {{ end }}
          <p><a href="http://localhost:9090/alerts">View in Prometheus</a> | 
             <a href="http://localhost:3002">View in Grafana</a></p>

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]

  - source_match:
      alertname: "ServiceDown"
    target_match_re:
      alertname: ".*"
    equal: ["job"]
